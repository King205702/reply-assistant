<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reply Assistant</title>
  <meta name="theme-color" content="#6750A4" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    :root {
      --purple: #6750A4;
      --bg: #141218;
      --card: #211F26;
      --text: #E6E1E9;
      --muted: #938F99;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .chip {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #4A4458;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }
    .chip.selected { background: var(--purple); border-color: var(--purple); }
    textarea, input[type="number"] {
      width: 100%;
      background: #2B2930;
      border: 1px solid #4A4458;
      border-radius: 12px;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
    }
    textarea { min-height: 90px; resize: vertical; }
    button.primary {
      width: 100%;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:disabled { opacity: 0.5; }
    .suggestion {
      background: #2B2930;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      font-size: 14px;
    }
    .suggestion button {
      margin-top: 8px;
      margin-right: 8px;
      background: transparent;
      color: var(--purple);
      border: none;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;
    }
    .status { font-size: 13px; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Reply Assistant</h1>
  <div class="subtitle">Set your style, then try a quick suggestion below.</div>

  <div class="card">
    <label>Reply style</label>
    <div class="chips" id="styleChips"></div>

    <label>Number of suggestions</label>
    <input type="number" id="numSuggestions" min="1" max="5" value="3" />
  </div>

  <div class="card">
    <label>Paste the last few messages from your conversation (one per line, oldest first)</label>
    <textarea id="convoInput" placeholder="e.g.&#10;haha yeah I've never been able to ski&#10;wait really, never once?&#10;nope lol, always wanted to try though"></textarea>
    <button class="primary" id="suggestBtn">Get suggestions</button>
    <div class="status" id="status"></div>
    <div id="results"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
